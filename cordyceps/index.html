<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Single-Point Cordyceps Colony</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #050505; font-family: system-ui, sans-serif; }
    #canvas-parent { width: 100%; height: 100%; }
    #panel { position: fixed; top: 10px; left: 10px; z-index: 10; width: 260px; background: rgba(12,16,20,.88); border: 1px solid rgba(255,170,80,.3); border-radius: 10px; padding: 12px; color: #ffeedd; }
    .row { margin-bottom: 10px; }
    .lab { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
    input[type="range"] { width: 100%; }
    button { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid rgba(255,170,80,.45); background: rgba(255,170,80,.15); color: #ffd9b0; cursor: pointer; }
  </style>
</head>
<body>
  <div id="canvas-parent"></div>
  <div id="panel">
    <div class="row"><div class="lab"><span>Speed</span><span id="v-speed">1.00</span></div><input id="s-speed" type="range" min="0.2" max="4" step="0.1" value="1"></div>
    <div class="row"><div class="lab"><span>Max Tips</span><span id="v-tips">4000</span></div><input id="s-tips" type="range" min="200" max="12000" step="100" value="4000"></div>
    <div class="row"><div class="lab"><span>Branchiness</span><span id="v-branch">0.16</span></div><input id="s-branch" type="range" min="0.01" max="0.6" step="0.01" value="0.16"></div>
    <div class="row"><div class="lab"><span>Orange Start</span><span id="v-ostart">0.35</span></div><input id="s-ostart" type="range" min="0" max="0.95" step="0.01" value="0.35"></div>
    <div class="row"><div class="lab"><span>Orange Ramp</span><span id="v-oramp">2.40</span></div><input id="s-oramp" type="range" min="0.2" max="8" step="0.1" value="2.4"></div>
    <div class="row"><div class="lab"><span>Orange Max</span><span id="v-omax">0.85</span></div><input id="s-omax" type="range" min="0" max="1" step="0.01" value="0.85"></div>
    <div class="row"><div class="lab"><span>Orange Center Bias</span><span id="v-ocb">0.70</span></div><input id="s-ocb" type="range" min="0" max="1" step="0.01" value="0.70"></div>
    <div class="row"><div class="lab"><span>Light</span><span id="v-light">0.85</span></div><input id="s-light" type="range" min="0" max="1" step="0.01" value="0.85"></div>
    <button id="restart">↺ Restart (single point)</button>
  </div>

  <script>
    const P = {
      speed: 1.0, maxTips: 4000, branch: 0.16,
      orangeStart: 0.35, orangeRamp: 2.4, orangeMax: 0.85, orangeCenterBias: 0.70, light: 0.85
    };

    const mapUI = [
      ["s-speed","v-speed","speed",v=>+v, v=>(+v).toFixed(2)],
      ["s-tips","v-tips","maxTips",v=>parseInt(v,10), v=>String(parseInt(v,10))],
      ["s-branch","v-branch","branch",v=>+v, v=>(+v).toFixed(2)],
      ["s-ostart","v-ostart","orangeStart",v=>+v, v=>(+v).toFixed(2)],
      ["s-oramp","v-oramp","orangeRamp",v=>+v, v=>(+v).toFixed(2)],
      ["s-omax","v-omax","orangeMax",v=>+v, v=>(+v).toFixed(2)],
      ["s-ocb","v-ocb","orangeCenterBias",v=>+v, v=>(+v).toFixed(2)],
      ["s-light","v-light","light",v=>+v, v=>(+v).toFixed(2)],
    ];
    mapUI.forEach(([sid,vid,key,parse,fmt])=>{
      const s=document.getElementById(sid), v=document.getElementById(vid);
      s.addEventListener("input",()=>{ P[key]=parse(s.value); v.textContent=fmt(s.value); });
    });

    let tips=[], origin, plateR, gw, gh, scale=3, nutrient, mat, orange, pg;

    function ixy(x,y){ return x+y*gw; }
    function sig(x){ return 1/(1+Math.exp(-x)); }
    function lerpA(a,b,t){ let d=(b-a+Math.PI*3)%(Math.PI*2)-Math.PI; return a+d*t; }

    function setup(){
      const c=createCanvas(window.innerWidth, window.innerHeight);
      c.parent("canvas-parent");
      colorMode(HSB,360,100,100,255);
      initSim();
      document.getElementById("restart").onclick=initSim;
    }

    function initSim(){
      background(0,0,7);
      origin=createVector(width*0.5,height*0.5);
      plateR=min(width,height)*0.46;
      gw=floor(width/scale); gh=floor(height/scale);
      nutrient=new Float32Array(gw*gh);
      mat=new Float32Array(gw*gh);
      orange=new Float32Array(gw*gh);
      for(let y=0;y<gh;y++) for(let x=0;x<gw;x++){
        const px=(x+.5)*scale, py=(y+.5)*scale;
        const d=dist(px,py,origin.x,origin.y);
        nutrient[ixy(x,y)] = d<=plateR ? max(0,1-(d/plateR)*0.3 + (noise(x*.06,y*.06)-.5)*.08) : 0;
      }
      pg=createGraphics(gw,gh); pg.colorMode(HSB,360,100,100,255); pg.noSmooth();

      // SINGLE POINT inoculation
      tips=[new Tip(origin.x, origin.y, random(TWO_PI), 0)];
    }

    class Tip{
      constructor(x,y,a,g){ this.x=x; this.y=y; this.a=a; this.g=g; this.age=0; this.no=random(1000); this.dead=false; this.step=random(.7,1.6)*pow(.88,g); }
      update(){
        this.age++;
        const d=dist(this.x,this.y,origin.x,origin.y);
        if(d>plateR){ this.dead=true; return; }

        const gx=floor(this.x/scale), gy=floor(this.y/scale);
        if(gx<1||gy<1||gx>=gw-1||gy>=gh-1){ this.dead=true; return; }

        const c=nutrient[ixy(gx,gy)];
        const nx=nutrient[ixy(gx+1,gy)]-nutrient[ixy(gx-1,gy)];
        const ny=nutrient[ixy(gx,gy+1)]-nutrient[ixy(gx,gy-1)];
        const gradA=atan2(ny,nx);
        const outA=atan2(this.y-origin.y,this.x-origin.x);
        const wander=(noise(this.no)-.5)*.35; this.no+=.02;
        this.a=lerpA(this.a, lerpA(gradA,outA,.18)+wander, .35);

        this.x += cos(this.a)*this.step*P.speed;
        this.y += sin(this.a)*this.step*P.speed;

        const gx2=floor(this.x/scale), gy2=floor(this.y/scale);
        if(gx2<0||gy2<0||gx2>=gw||gy2>=gh){ this.dead=true; return; }
        const id=ixy(gx2,gy2);

        nutrient[id]=max(0, nutrient[id]-(.01+.01*(1-c)));
        mat[id]=min(1, mat[id]+(.01+.02*(1-nutrient[id])));

        const maturity=mat[id];
        const t=(maturity-P.orangeStart)/(1-P.orangeStart);
        const ramp=sig(t*P.orangeRamp);
        const center=1-constrain(d/plateR,0,1);
        const spatial=lerp(1-center,center,P.orangeCenterBias);
        orange[id]=min(1, orange[id]+0.015*P.light*P.orangeMax*ramp*spatial);

        if(tips.length<P.maxTips){
          const p=P.branch*pow(.78,this.g)*constrain(map(nutrient[id],0,1,.2,1),0,1);
          if(random()<p) tips.push(new Tip(this.x,this.y,this.a+random([-1,1])*random(.15,.55),this.g+1));
        }

        if(nutrient[id]<.02||this.age>420) this.dead=true;
      }
    }

    function draw(){
      const steps=max(1,floor(2*P.speed));
      for(let s=0;s<steps;s++){
        for(let i=tips.length-1;i>=0;i--){
          tips[i].update();
          if(tips[i].dead){ tips[i]=tips[tips.length-1]; tips.pop(); }
        }
      }

      pg.loadPixels();
      for(let y=0;y<gh;y++) for(let x=0;x<gw;x++){
        const px=(x+.5)*scale, py=(y+.5)*scale, d=dist(px,py,origin.x,origin.y), id=ixy(x,y);
        let h=210,s=10,b=9;
        if(d<=plateR){
          const m=constrain(mat[id],0,1), o=orange[id];
          let mh=40, ms=lerp(12,4,m), mb=lerp(12,80,m);
          mh=lerp(mh,28,o); ms=lerp(ms,85,o); mb=lerp(mb,95,o);
          h=mh; s=ms; b=mb;
        }
        const c=pg.color(h,s,b,255), off=4*(x+y*gw);
        pg.pixels[off]=red(c); pg.pixels[off+1]=green(c); pg.pixels[off+2]=blue(c); pg.pixels[off+3]=255;
      }
      pg.updatePixels();

      background(0,0,7);
      image(pg,0,0,width,height);
      noFill(); stroke(0,0,100,45); strokeWeight(2); circle(origin.x,origin.y,plateR*2);
      noStroke(); fill(0,0,100,80); textSize(12); text(`tips: ${tips.length}`, 12, height-16);
    }

    function windowResized(){ resizeCanvas(window.innerWidth, window.innerHeight); initSim(); }
  </script>
</body>
</html>
