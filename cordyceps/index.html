<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cordyceps militaris Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #0c0e12; font-family: system-ui, sans-serif; }
        #canvas-parent { width: 100%; height: 100%; }

        #toggle-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 20;
            padding: 8px 14px;
            background: rgba(12, 16, 20, 0.85);
            border: 1px solid rgba(255, 170, 80, 0.45);
            border-radius: 8px;
            color: #ffaa50;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0.03em;
        }
        #toggle-btn:hover { background: rgba(255, 170, 80, 0.12); }

        #control-panel {
            position: fixed;
            top: 50px;
            right: 12px;
            z-index: 10;
            width: 240px;
            background: rgba(12, 16, 20, 0.88);
            border: 1px solid rgba(255, 170, 80, 0.3);
            border-radius: 10px;
            padding: 14px;
            color: #ffeedd;
            transition: opacity 0.2s, transform 0.2s;
        }
        #control-panel.hidden { opacity: 0; pointer-events: none; transform: translateY(-8px); }

        .row { margin-bottom: 10px; }
        .lab { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: #ffd9b0; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 170, 80, 0.2);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff9a40;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #ff9a40;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        #restart-btn {
            width: 100%;
            margin-top: 6px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 170, 80, 0.45);
            background: rgba(255, 170, 80, 0.12);
            color: #ffd9b0;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.03em;
        }
        #restart-btn:hover { background: rgba(255, 170, 80, 0.22); }
    </style>
</head>
<body>
    <div id="canvas-parent"></div>
    <button id="toggle-btn">⚙ Controls</button>
    <div id="control-panel">
        <div class="row"><div class="lab"><span>Growth Speed</span><span id="v-growthSpeed">0.15</span></div><input id="s-growthSpeed" type="range" min="0.02" max="0.60" step="0.01" value="0.15"></div>
        <div class="row"><div class="lab"><span>Edge Fuzziness</span><span id="v-fuzziness">0.28</span></div><input id="s-fuzziness" type="range" min="0.00" max="0.70" step="0.01" value="0.28"></div>
        <div class="row"><div class="lab"><span>Puff Density</span><span id="v-density">22</span></div><input id="s-density" type="range" min="5" max="60" step="1" value="22"></div>
        <div class="row"><div class="lab"><span>Orange Intensity</span><span id="v-colorIntensity">1.00</span></div><input id="s-colorIntensity" type="range" min="0.0" max="2.0" step="0.05" value="1.0"></div>
        <button id="restart-btn">↺ Restart</button>
    </div>

    <script>
    let colonyRadius, t, cx, cy, frameNum;

    let params = {
        growthSpeed:    0.15,
        fuzziness:      0.28,
        density:        22,
        colorIntensity: 1.0,
    };

    // Toggle control panel
    const toggleBtn = document.getElementById('toggle-btn');
    const panel     = document.getElementById('control-panel');
    toggleBtn.addEventListener('click', () => panel.classList.toggle('hidden'));

    // Wire up sliders
    const sliders = [
        ['s-growthSpeed',    'v-growthSpeed',    'growthSpeed',    v => parseFloat(v), v => parseFloat(v).toFixed(2)],
        ['s-fuzziness',      'v-fuzziness',      'fuzziness',      v => parseFloat(v), v => parseFloat(v).toFixed(2)],
        ['s-density',        'v-density',        'density',        v => parseInt(v),   v => String(parseInt(v))],
        ['s-colorIntensity', 'v-colorIntensity', 'colorIntensity', v => parseFloat(v), v => parseFloat(v).toFixed(2)],
    ];
    sliders.forEach(([sid, vid, key, parse, fmt]) => {
        const s = document.getElementById(sid);
        const v = document.getElementById(vid);
        s.addEventListener('input', () => { params[key] = parse(s.value); v.textContent = fmt(s.value); });
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
        if (typeof initSimulation === 'function') initSimulation();
    });

    function setup() {
        let parent = document.getElementById('canvas-parent');
        let canvas = createCanvas(parent.clientWidth, parent.clientHeight);
        canvas.parent('canvas-parent');
        colorMode(HSB, 360, 100, 100, 100);
        initSimulation();
    }

    function initSimulation() {
        background(10, 8, 6);
        colonyRadius = 6;
        t = 0;
        frameNum = 0;
        cx = width * 0.5;
        cy = height * 0.5;

        // Draw initial dense inoculation point
        noStroke();
        for (let r = 14; r > 0; r--) {
            fill(24, 65 * params.colorIntensity, 90, map(r, 14, 0, 2, 28));
            ellipse(cx, cy, r * 3, r * 3);
        }
    }

    function draw() {
        t += 0.004;
        frameNum++;

        // Grow colony radius up to near canvas edge
        let maxR = min(width, height) * 0.47;
        if (colonyRadius < maxR) {
            colonyRadius += params.growthSpeed;
        }

        noStroke();
        let n = Math.max(1, Math.round(params.density));

        for (let i = 0; i < n; i++) {
            let angle = random(TWO_PI);

            // Noise-displaced edge for organic, non-circular shape
            let nv = noise(cos(angle) * 3.0 + t * 0.6, sin(angle) * 3.0 + t * 0.6);
            let edgeR = colonyRadius * (1.0 + (nv - 0.5) * params.fuzziness);

            // Distribute puffs across zones: mostly at growing edge, some in interior
            let rPos;
            let zone = random();
            if (zone < 0.55) {
                rPos = edgeR * random(0.78, 1.06);  // growing edge
            } else if (zone < 0.80) {
                rPos = edgeR * random(0.45, 0.78);  // mid zone
            } else {
                rPos = edgeR * random(0, 0.45);     // dense core
            }

            let x = cx + cos(angle) * rPos;
            let y = cy + sin(angle) * rPos;

            let dr = constrain(rPos / max(colonyRadius, 1), 0, 1.3);

            let hue, sat, bri, alpha, sz;

            if (dr < 0.35) {
                // Core: warm orange-amber
                hue   = lerp(20, 28, random());
                sat   = lerp(58, 76, random()) * params.colorIntensity;
                bri   = lerp(82, 94, random());
                alpha = lerp(7, 20, random());
                sz    = random(7, 22);
            } else if (dr < 0.68) {
                // Mid zone: cream-orange fading to off-white
                hue   = lerp(27, 38, random());
                sat   = lerp(14, 48, random()) * params.colorIntensity;
                bri   = lerp(88, 98, random());
                alpha = lerp(4, 11, random());
                sz    = random(5, 16);
            } else if (dr < 0.88) {
                // Outer zone: mostly white with warm tinge
                hue   = lerp(33, 50, random());
                sat   = lerp(3, 14, random()) * params.colorIntensity;
                bri   = lerp(93, 100, random());
                alpha = lerp(2, 7, random());
                sz    = random(4, 13);
            } else {
                // Wispy edge: nearly transparent
                hue   = lerp(38, 58, random());
                sat   = lerp(1, 7, random()) * params.colorIntensity;
                bri   = lerp(94, 100, random());
                alpha = lerp(1, 4, random());
                sz    = random(3, 10);
            }

            // Inner puff
            fill(hue, sat, bri, alpha);
            ellipse(x, y, sz, sz);

            // Soft outer halo — makes each puff look fluffy
            fill(hue, sat * 0.35, bri, alpha * 0.28);
            ellipse(x, y, sz * 2.5, sz * 2.5);
        }

        // Periodically reinforce center density so core stays rich and opaque
        if (frameNum % 4 === 0) {
            for (let i = 0; i < 6; i++) {
                let angle = random(TWO_PI);
                let r     = random(colonyRadius * 0.3);
                fill(23, 68 * params.colorIntensity, 88, random(3, 12));
                ellipse(cx + cos(angle) * r, cy + sin(angle) * r, random(6, 20), random(6, 20));
            }
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        initSimulation();
    }
    </script>
</body>
</html>
