<!DOCTYPE html>
<html>
<head>
    <title>Cordyceps Militaris Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <h1>Cordyceps Militaris Petri Colony Simulation</h1>
    <p>Adjust the parameters below to simulate the growth of a Cordyceps militaris petri colony.</p>
    <div>
        <label for="orangeStart">Orange Start:</label>
        <input type="range" id="orangeStart" min="0" max="10" value="5"><br>
        <label for="orangeRamp">Orange Ramp:</label>
        <input type="range" id="orangeRamp" min="0.1" max="1" step="0.1" value="0.5"><br>
        <label for="orangeMax">Orange Max:</label>
        <input type="range" id="orangeMax" min="0" max="10" value="8"><br>
        <label for="orangeCenterBias">Orange Center Bias:</label>
        <input type="range" id="orangeCenterBias" min="0" max="1" step="0.1" value="0.5"><br>
        <label for="light">Light:</label>
        <input type="range" id="light" min="0" max="10" value="5"><br>
        <label for="speed">Speed:</label>
        <input type="range" id="speed" min="1" max="10" value="5"><br>
        <label for="tips">Tips:</label>
        <input type="range" id="tips" min="1" max="10" value="2"><br>
        <label for="inoculumRadius">Inoculum Radius:</label>
        <input type="range" id="inoculumRadius" min="0" max="10" value="3"><br>
    </div>

</body>
</html>
