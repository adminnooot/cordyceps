<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cordyceps militaris Simulation</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #0a0b09; font-family: system-ui, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }

        #toggle-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 20;
            padding: 8px 14px;
            background: rgba(12, 16, 20, 0.85);
            border: 1px solid rgba(255, 170, 80, 0.45);
            border-radius: 8px;
            color: #ffaa50;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0.03em;
        }
        #toggle-btn:hover { background: rgba(255, 170, 80, 0.12); }

        #control-panel {
            position: fixed;
            top: 50px;
            right: 12px;
            z-index: 10;
            width: 240px;
            background: rgba(12, 16, 20, 0.88);
            border: 1px solid rgba(255, 170, 80, 0.3);
            border-radius: 10px;
            padding: 14px;
            color: #ffeedd;
            transition: opacity 0.2s, transform 0.2s;
        }
        #control-panel.hidden { opacity: 0; pointer-events: none; transform: translateY(-8px); }

        .row { margin-bottom: 10px; }
        .lab { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: #ffd9b0; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 170, 80, 0.2);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff9a40;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #ff9a40;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        #restart-btn {
            width: 100%;
            margin-top: 6px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 170, 80, 0.45);
            background: rgba(255, 170, 80, 0.12);
            color: #ffd9b0;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.03em;
        }
        #restart-btn:hover { background: rgba(255, 170, 80, 0.22); }
    </style>
</head>
<body>
    <canvas id="sim"></canvas>
    <button id="toggle-btn">⚙ Controls</button>
    <div id="control-panel">
        <div class="row"><div class="lab"><span>Growth Speed</span><span id="v-growthSpeed">0.15</span></div><input id="s-growthSpeed" type="range" min="0.02" max="0.60" step="0.01" value="0.15"></div>
        <div class="row"><div class="lab"><span>Edge Fuzziness</span><span id="v-fuzziness">0.28</span></div><input id="s-fuzziness" type="range" min="0.00" max="0.70" step="0.01" value="0.28"></div>
        <div class="row"><div class="lab"><span>Edge Texture</span><span id="v-density">4</span></div><input id="s-density" type="range" min="1" max="12" step="1" value="4"></div>
        <div class="row"><div class="lab"><span>Orange Intensity</span><span id="v-colorIntensity">1.00</span></div><input id="s-colorIntensity" type="range" min="0.0" max="2.0" step="0.05" value="1.0"></div>
        <button id="restart-btn">↺ Restart</button>
    </div>

    <script>
    'use strict';

    // ── Canvas setup ──────────────────────────────────────────────────────────
    const cv  = document.getElementById('sim');
    const ctx = cv.getContext('2d');

    let colonyRadius, tick, cx, cy;
    let rafId = null, lastStamp = 0;
    const FRAME_MS = 1000 / 30;   // target 30 fps — halves CPU vs 60 fps

    const params = {
        growthSpeed:    0.18,
        fuzziness:      0.30,
        density:        4,
        colorIntensity: 1.0,
    };

    const SEGS = 64; // polygon resolution for noisy edge

    // ── Minimal smooth 2-D value noise (no external library) ─────────────────
    function hash2D(x, y) {
        const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
        return n - Math.floor(n);
    }
    function noise(x, y) {
        const ix = Math.floor(x), iy = Math.floor(y);
        const fx = x - ix,        fy = y - iy;
        const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
        const a = hash2D(ix, iy),     b = hash2D(ix + 1, iy);
        const c = hash2D(ix, iy + 1), d = hash2D(ix + 1, iy + 1);
        return a + (b - a) * ux + (c - a) * uy + (a - b - c + d) * ux * uy;
    }

    // ── Draw one soft radial-gradient blob ───────────────────────────────────
    function puff(x, y, sz, h, s, l, a) {
        const grd = ctx.createRadialGradient(x, y, 0, x, y, sz);
        grd.addColorStop(0, `hsla(${h},${s}%,${l}%,${a})`);
        grd.addColorStop(1, `hsla(${h},${s}%,${l}%,0)`);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(x, y, sz, 0, Math.PI * 2);
        ctx.fill();
    }

    // ── Initialise / restart simulation ──────────────────────────────────────
    function init() {
        if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
        cv.width  = cv.clientWidth  || window.innerWidth;
        cv.height = cv.clientHeight || window.innerHeight;
        cx = cv.width  * 0.5;
        cy = cv.height * 0.5;
        colonyRadius = 6;
        tick = 0;

        ctx.fillStyle = '#0a0b09';
        ctx.fillRect(0, 0, cv.width, cv.height);

        // Inoculation dot — warm orange rings from outside in
        const ci = params.colorIntensity;
        for (let r = 14; r > 0; r--) {
            const a = (14 - r) / 14 * 0.22 + 0.02;
            puff(cx, cy, r * 2.4, 23, Math.min(100, 70 * ci), 55, a);
        }

        lastStamp = 0;
        rafId = requestAnimationFrame(frame);
    }

    // ── Animation loop (30 fps cap) ───────────────────────────────────────────
    function frame(ts) {
        rafId = requestAnimationFrame(frame);
        const dt = ts - lastStamp;
        if (dt < FRAME_MS) return;
        lastStamp = ts - (dt % FRAME_MS);
        step();
    }

    // ── One simulation step ───────────────────────────────────────────────────
    function step() {
        tick++;
        const T  = tick * 0.0025;
        const cr = colonyRadius;
        const maxR = Math.min(cv.width, cv.height) * 0.47;
        if (cr < maxR) colonyRadius += params.growthSpeed;

        const fz = params.fuzziness;
        const ci = params.colorIntensity;

        // Compute noisy edge — 64-point polygon (two octaves for organic shape)
        const pts = new Float32Array(SEGS * 2);
        for (let i = 0; i < SEGS; i++) {
            const ang = (i / SEGS) * Math.PI * 2;
            const ca  = Math.cos(ang), sa = Math.sin(ang);
            const nv  = noise(ca * 2.8 + T * 0.5, sa * 2.8 + T * 0.4) * 0.65
                      + noise(ca * 6.0 + T * 1.2, sa * 6.0 + T * 1.1) * 0.35;
            const r   = cr * (1.0 + (nv - 0.5) * fz);
            pts[i * 2]     = cx + ca * r;
            pts[i * 2 + 1] = cy + sa * r;
        }

        // ── Main fill: one noisy circle, accumulates density naturally over time
        const edgeR = cr * (1.0 + fz * 0.5);
        const grd   = ctx.createRadialGradient(cx, cy, 0, cx, cy, edgeR);
        grd.addColorStop(0,    `hsla(22, ${Math.min(100, 62 * ci)}%, 50%, 0.018)`);
        grd.addColorStop(0.40, `hsla(27, ${Math.min(100, 28 * ci)}%, 68%, 0.014)`);
        grd.addColorStop(0.75, `hsla(33, ${Math.min(100,  7 * ci)}%, 88%, 0.009)`);
        grd.addColorStop(1.0,  `hsla(37, ${Math.min(100,  2 * ci)}%, 95%, 0.003)`);
        ctx.beginPath();
        ctx.moveTo(pts[0], pts[1]);
        for (let i = 1; i < SEGS; i++) ctx.lineTo(pts[i * 2], pts[i * 2 + 1]);
        ctx.closePath();
        ctx.fillStyle = grd;
        ctx.fill();

        // ── Edge texture: sparse wispy blobs at frontier (every other frame) ──
        if (tick % 2 === 0) {
            const n  = Math.max(1, params.density | 0);
            const ws = Math.min(100, 5 * ci);
            for (let i = 0; i < n; i++) {
                const idx = (Math.random() * SEGS | 0);
                const ex  = pts[idx * 2], ey = pts[idx * 2 + 1];
                const bx  = ex + (Math.random() - 0.5) * cr * 0.07;
                const by  = ey + (Math.random() - 0.5) * cr * 0.07;
                const sz  = 3 + Math.random() * 7;
                const g   = ctx.createRadialGradient(bx, by, 0, bx, by, sz);
                g.addColorStop(0, `hsla(34, ${ws}%, 93%, 0.06)`);
                g.addColorStop(1, `hsla(34, ${ws}%, 93%, 0)`);
                ctx.beginPath();
                ctx.arc(bx, by, sz, 0, Math.PI * 2);
                ctx.fillStyle = g;
                ctx.fill();
            }
        }

        // ── Core reinforcement every 8 ticks — deepens warm orange centre ─────
        if (tick % 8 === 0) {
            for (let i = 0; i < 2; i++) {
                const ang = Math.random() * Math.PI * 2;
                const r   = Math.random() * cr * 0.22;
                const bx  = cx + Math.cos(ang) * r;
                const by  = cy + Math.sin(ang) * r;
                const sz  = 6 + Math.random() * 14;
                const g   = ctx.createRadialGradient(bx, by, 0, bx, by, sz);
                g.addColorStop(0, `hsla(22, ${Math.min(100, 68 * ci)}%, 50%, 0.04)`);
                g.addColorStop(1, `hsla(22, ${Math.min(100, 68 * ci)}%, 50%, 0)`);
                ctx.beginPath();
                ctx.arc(bx, by, sz, 0, Math.PI * 2);
                ctx.fillStyle = g;
                ctx.fill();
            }
        }
    }

    // ── Control panel wiring ─────────────────────────────────────────────────
    document.getElementById('toggle-btn').addEventListener('click', () =>
        document.getElementById('control-panel').classList.toggle('hidden'));

    [
        ['s-growthSpeed',    'v-growthSpeed',    'growthSpeed',    v => +v,  v => (+v).toFixed(2)],
        ['s-fuzziness',      'v-fuzziness',      'fuzziness',      v => +v,  v => (+v).toFixed(2)],
        ['s-density',        'v-density',        'density',        v => v|0, v => String(v|0)     ],
        ['s-colorIntensity', 'v-colorIntensity', 'colorIntensity', v => +v,  v => (+v).toFixed(2)],
    ].forEach(([sid, vid, key, parse, fmt]) => {
        const sl = document.getElementById(sid);
        const vl = document.getElementById(vid);
        sl.addEventListener('input', () => { params[key] = parse(sl.value); vl.textContent = fmt(sl.value); });
    });

    document.getElementById('restart-btn').addEventListener('click', init);

    // ── Resize (debounced) ────────────────────────────────────────────────────
    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(init, 150); });

    // ── Boot ──────────────────────────────────────────────────────────────────
    init();
    </script>
</body>
</html>
