<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cordyceps militaris Simulation</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #0a0b09; font-family: system-ui, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }

        #toggle-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 20;
            padding: 8px 14px;
            background: rgba(12, 16, 20, 0.85);
            border: 1px solid rgba(255, 170, 80, 0.45);
            border-radius: 8px;
            color: #ffaa50;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0.03em;
        }
        #toggle-btn:hover { background: rgba(255, 170, 80, 0.12); }

        #control-panel {
            position: fixed;
            top: 50px;
            right: 12px;
            z-index: 10;
            width: 240px;
            background: rgba(12, 16, 20, 0.88);
            border: 1px solid rgba(255, 170, 80, 0.3);
            border-radius: 10px;
            padding: 14px;
            color: #ffeedd;
            transition: opacity 0.2s, transform 0.2s;
        }
        #control-panel.hidden { opacity: 0; pointer-events: none; transform: translateY(-8px); }

        .row { margin-bottom: 10px; }
        .lab { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: #ffd9b0; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 170, 80, 0.2);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff9a40;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #ff9a40;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        #restart-btn {
            width: 100%;
            margin-top: 6px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 170, 80, 0.45);
            background: rgba(255, 170, 80, 0.12);
            color: #ffd9b0;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.03em;
        }
        #restart-btn:hover { background: rgba(255, 170, 80, 0.22); }
    </style>
</head>
<body>
    <canvas id="sim"></canvas>
    <button id="toggle-btn">⚙ Controls</button>
    <div id="control-panel">
        <div class="row"><div class="lab"><span>Growth Speed</span><span id="v-growthSpeed">0.15</span></div><input id="s-growthSpeed" type="range" min="0.02" max="0.60" step="0.01" value="0.15"></div>
        <div class="row"><div class="lab"><span>Edge Fuzziness</span><span id="v-fuzziness">0.28</span></div><input id="s-fuzziness" type="range" min="0.00" max="0.70" step="0.01" value="0.28"></div>
        <div class="row"><div class="lab"><span>Puff Density</span><span id="v-density">22</span></div><input id="s-density" type="range" min="5" max="60" step="1" value="22"></div>
        <div class="row"><div class="lab"><span>Orange Intensity</span><span id="v-colorIntensity">1.00</span></div><input id="s-colorIntensity" type="range" min="0.0" max="2.0" step="0.05" value="1.0"></div>
        <button id="restart-btn">↺ Restart</button>
    </div>

    <script>
    'use strict';

    // ── Canvas setup ──────────────────────────────────────────────────────────
    const cv  = document.getElementById('sim');
    const ctx = cv.getContext('2d');

    let colonyRadius, tick, cx, cy;
    let rafId = null, lastStamp = 0;
    const FRAME_MS = 1000 / 30;   // target 30 fps — halves CPU vs 60 fps

    const params = {
        growthSpeed:    0.15,
        fuzziness:      0.28,
        density:        22,
        colorIntensity: 1.0,
    };

    // ── Minimal smooth 2-D value noise (no external library) ─────────────────
    function hash2D(x, y) {
        const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
        return n - Math.floor(n);
    }
    function noise(x, y) {
        const ix = Math.floor(x), iy = Math.floor(y);
        const fx = x - ix,        fy = y - iy;
        const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
        const a = hash2D(ix, iy),     b = hash2D(ix + 1, iy);
        const c = hash2D(ix, iy + 1), d = hash2D(ix + 1, iy + 1);
        return a + (b - a) * ux + (c - a) * uy + (a - b - c + d) * ux * uy;
    }

    // ── Draw one soft radial-gradient blob ───────────────────────────────────
    function puff(x, y, sz, h, s, l, a) {
        const grd = ctx.createRadialGradient(x, y, 0, x, y, sz);
        grd.addColorStop(0, `hsla(${h},${s}%,${l}%,${a})`);
        grd.addColorStop(1, `hsla(${h},${s}%,${l}%,0)`);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(x, y, sz, 0, Math.PI * 2);
        ctx.fill();
    }

    // ── Initialise / restart simulation ──────────────────────────────────────
    function init() {
        if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
        cv.width  = cv.clientWidth  || window.innerWidth;
        cv.height = cv.clientHeight || window.innerHeight;
        cx = cv.width  * 0.5;
        cy = cv.height * 0.5;
        colonyRadius = 6;
        tick = 0;

        ctx.fillStyle = '#0a0b09';
        ctx.fillRect(0, 0, cv.width, cv.height);

        // Inoculation dot — warm orange rings from outside in
        const ci = params.colorIntensity;
        for (let r = 14; r > 0; r--) {
            const a = (14 - r) / 14 * 0.22 + 0.02;
            puff(cx, cy, r * 2.4, 23, Math.min(100, 70 * ci), 55, a);
        }

        lastStamp = 0;
        rafId = requestAnimationFrame(frame);
    }

    // ── Animation loop (30 fps cap) ───────────────────────────────────────────
    function frame(ts) {
        rafId = requestAnimationFrame(frame);
        const dt = ts - lastStamp;
        if (dt < FRAME_MS) return;
        lastStamp = ts - (dt % FRAME_MS);
        step();
    }

    // ── One simulation step ───────────────────────────────────────────────────
    function step() {
        tick++;
        const T  = tick * 0.004;
        const cr = colonyRadius;
        const maxR = Math.min(cv.width, cv.height) * 0.47;
        if (cr < maxR) colonyRadius += params.growthSpeed;

        const n  = Math.max(1, params.density | 0);
        const ci = params.colorIntensity;
        const fz = params.fuzziness;

        for (let i = 0; i < n; i++) {
            const ang = Math.random() * Math.PI * 2;
            const ca  = Math.cos(ang), sa = Math.sin(ang);

            // Noise-deformed frontier radius
            const nv    = noise(ca * 3.0 + T * 0.6, sa * 3.0 + T * 0.6);
            const edgeR = cr * (1.0 + (nv - 0.5) * fz);

            // Zone distribution: 55 % edge, 25 % mid, 20 % core
            let rPos;
            const zone = Math.random();
            if (zone < 0.55)      rPos = edgeR * (0.78 + Math.random() * 0.28);
            else if (zone < 0.80) rPos = edgeR * (0.45 + Math.random() * 0.33);
            else                  rPos = edgeR *  Math.random() * 0.45;

            const x  = cx + ca * rPos;
            const y  = cy + sa * rPos;
            const dr = Math.min(rPos / Math.max(cr, 1), 1.3);

            let h, s, l, a, sz;

            if (dr < 0.35) {
                // Core: warm orange-amber
                h  = 20 + Math.random() * 8;
                s  = Math.min(100, (55 + Math.random() * 20) * ci);
                l  = 48 + Math.random() * 12;
                a  = 0.07 + Math.random() * 0.13;
                sz = 7   + Math.random() * 15;
            } else if (dr < 0.68) {
                // Mid: cream-orange fading to off-white
                h  = 27 + Math.random() * 11;
                s  = Math.min(100, (30 + Math.random() * 62) * ci);
                l  = 72 + Math.random() * 15;
                a  = 0.04 + Math.random() * 0.07;
                sz = 5   + Math.random() * 11;
            } else if (dr < 0.88) {
                // Outer: mostly white, warm tinge
                h  = 33 + Math.random() * 17;
                s  = Math.min(100, (3 + Math.random() * 9) * ci);
                l  = 87 + Math.random() * 10;
                a  = 0.02 + Math.random() * 0.05;
                sz = 4   + Math.random() * 9;
            } else {
                // Wispy edge: nearly transparent
                h  = 38 + Math.random() * 20;
                s  = Math.min(100, (1 + Math.random() * 5) * ci);
                l  = 93 + Math.random() * 7;
                a  = 0.01 + Math.random() * 0.03;
                sz = 3   + Math.random() * 7;
            }

            puff(x, y, sz,        h, s,        l, a);         // inner blob
            puff(x, y, sz * 2.5,  h, s * 0.35, l, a * 0.28); // soft outer halo
        }

        // Reinforce center density every 4 ticks
        if (tick % 4 === 0) {
            for (let i = 0; i < 6; i++) {
                const ang = Math.random() * Math.PI * 2;
                const r   = Math.random() * cr * 0.3;
                puff(cx + Math.cos(ang) * r, cy + Math.sin(ang) * r,
                     4 + Math.random() * 10, 23, Math.min(100, 65 * ci), 52,
                     0.03 + Math.random() * 0.09);
            }
        }
    }

    // ── Control panel wiring ─────────────────────────────────────────────────
    document.getElementById('toggle-btn').addEventListener('click', () =>
        document.getElementById('control-panel').classList.toggle('hidden'));

    [
        ['s-growthSpeed',    'v-growthSpeed',    'growthSpeed',    v => +v,  v => (+v).toFixed(2)],
        ['s-fuzziness',      'v-fuzziness',      'fuzziness',      v => +v,  v => (+v).toFixed(2)],
        ['s-density',        'v-density',        'density',        v => v|0, v => String(v|0)     ],
        ['s-colorIntensity', 'v-colorIntensity', 'colorIntensity', v => +v,  v => (+v).toFixed(2)],
    ].forEach(([sid, vid, key, parse, fmt]) => {
        const sl = document.getElementById(sid);
        const vl = document.getElementById(vid);
        sl.addEventListener('input', () => { params[key] = parse(sl.value); vl.textContent = fmt(sl.value); });
    });

    document.getElementById('restart-btn').addEventListener('click', init);

    // ── Resize (debounced) ────────────────────────────────────────────────────
    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(init, 150); });

    // ── Boot ──────────────────────────────────────────────────────────────────
    init();
    </script>
</body>
</html>
