<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cordyceps militaris Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #0c0e12; font-family: system-ui, sans-serif; }
        #canvas-parent { width: 100%; height: 100%; }

        #toggle-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 20;
            padding: 8px 14px;
            background: rgba(12, 16, 20, 0.85);
            border: 1px solid rgba(255, 170, 80, 0.45);
            border-radius: 8px;
            color: #ffaa50;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0.03em;
        }
        #toggle-btn:hover { background: rgba(255, 170, 80, 0.12); }

        #control-panel {
            position: fixed;
            top: 50px;
            right: 12px;
            z-index: 10;
            width: 260px;
            background: rgba(12, 16, 20, 0.88);
            border: 1px solid rgba(255, 170, 80, 0.3);
            border-radius: 10px;
            padding: 14px;
            color: #ffeedd;
            transition: opacity 0.2s, transform 0.2s;
        }
        #control-panel.hidden { opacity: 0; pointer-events: none; transform: translateY(-8px); }

        .row { margin-bottom: 10px; }
        .lab { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: #ffd9b0; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 170, 80, 0.2);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff9a40;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #ff9a40;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        #restart-btn {
            width: 100%;
            margin-top: 6px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 170, 80, 0.45);
            background: rgba(255, 170, 80, 0.12);
            color: #ffd9b0;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.03em;
        }
        #restart-btn:hover { background: rgba(255, 170, 80, 0.22); }
    </style>
</head>
<body>
    <div id="canvas-parent"></div>
    <button id="toggle-btn">⚙ Controls</button>
    <div id="control-panel">
        <div class="row"><div class="lab"><span>Speed</span><span id="v-speedMult">0.80</span></div><input id="s-speedMult" type="range" min="0.2" max="3.0" step="0.1" value="0.8"></div>
        <div class="row"><div class="lab"><span>Max Hyphae</span><span id="v-maxHyphae">3000</span></div><input id="s-maxHyphae" type="range" min="500" max="8000" step="500" value="3000"></div>
        <div class="row"><div class="lab"><span>Spawn Count</span><span id="v-spawnCount">80</span></div><input id="s-spawnCount" type="range" min="10" max="200" step="10" value="80"></div>
        <div class="row"><div class="lab"><span>Max Generations</span><span id="v-maxGen">9</span></div><input id="s-maxGen" type="range" min="2" max="15" step="1" value="9"></div>
        <div class="row"><div class="lab"><span>Taper Rate</span><span id="v-taperRate">0.9990</span></div><input id="s-taperRate" type="range" min="0.990" max="0.9999" step="0.0001" value="0.999"></div>
        <div class="row"><div class="lab"><span>Wander Scale</span><span id="v-wanderScale">0.30</span></div><input id="s-wanderScale" type="range" min="0.05" max="0.80" step="0.01" value="0.30"></div>
        <div class="row"><div class="lab"><span>Branch Prob</span><span id="v-branchProb">0.120</span></div><input id="s-branchProb" type="range" min="0.01" max="0.40" step="0.005" value="0.12"></div>
        <div class="row"><div class="lab"><span>Orange Intensity</span><span id="v-orangeIntensity">1.00</span></div><input id="s-orangeIntensity" type="range" min="0" max="2" step="0.05" value="1.0"></div>
        <button id="restart-btn">↺ Restart</button>
    </div>

    <script>
    let hyphae = [];
    let originX, originY;

    let params = {
        speedMult:       0.8,
        maxHyphae:       3000,
        spawnCount:      80,
        maxGen:          9,
        taperRate:       0.999,
        wanderScale:     0.30,
        branchProb:      0.12,
        orangeIntensity: 1.0,
    };

    let cachedMaxD = 1; // pre-computed max distance for color blend, set in initSimulation

    // Toggle control panel
    const toggleBtn = document.getElementById('toggle-btn');
    const panel     = document.getElementById('control-panel');
    toggleBtn.addEventListener('click', () => panel.classList.toggle('hidden'));

    // Wire up sliders
    const sliders = [
        ['s-speedMult',       'v-speedMult',       'speedMult',       v => parseFloat(v),  v => parseFloat(v).toFixed(2)],
        ['s-maxHyphae',       'v-maxHyphae',       'maxHyphae',       v => parseInt(v),     v => String(parseInt(v))],
        ['s-spawnCount',      'v-spawnCount',      'spawnCount',      v => parseInt(v),     v => String(parseInt(v))],
        ['s-maxGen',          'v-maxGen',          'maxGen',          v => parseInt(v),     v => String(parseInt(v))],
        ['s-taperRate',       'v-taperRate',       'taperRate',       v => parseFloat(v),   v => parseFloat(v).toFixed(4)],
        ['s-wanderScale',     'v-wanderScale',     'wanderScale',     v => parseFloat(v),   v => parseFloat(v).toFixed(2)],
        ['s-branchProb',      'v-branchProb',      'branchProb',      v => parseFloat(v),   v => parseFloat(v).toFixed(3)],
        ['s-orangeIntensity', 'v-orangeIntensity', 'orangeIntensity', v => parseFloat(v),   v => parseFloat(v).toFixed(2)],
    ];
    sliders.forEach(([sid, vid, key, parse, fmt]) => {
        const s = document.getElementById(sid);
        const v = document.getElementById(vid);
        s.addEventListener('input', () => { params[key] = parse(s.value); v.textContent = fmt(s.value); });
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
        if (typeof initSimulation === 'function') initSimulation();
    });

    class Hypha {
        constructor(x, y, angle, w, generation = 0) {
            this.x           = x;
            this.y           = y;
            this.prevX       = x;
            this.prevY       = y;
            this.angle       = angle;
            this.w           = w;
            this.generation  = generation;
            this.speed       = random(0.7, 1.4) * Math.pow(0.85, generation) * params.speedMult;
            this.stopped     = false;
            this.noiseOffset = random(1000);
            this.taperRate   = params.taperRate - generation * 0.0002;
            this.noiseFrame  = random() < 0.5; // stagger noise updates across the colony
            this.lastNoiseAdj = 0; // cached angle adjustment from last noise frame
        }

        update() {
            this.prevX = this.x;
            this.prevY = this.y;

            // Only run expensive noise + outward-bias calc every other update
            this.noiseFrame = !this.noiseFrame;
            if (this.noiseFrame) {
                let noiseVal = noise(this.noiseOffset) - 0.5;
                this.noiseOffset += 0.012;
                this.lastNoise = noiseVal * params.wanderScale;
                this.angle += this.lastNoise;

                // Weak outward bias — use Math.atan2 directly (skip p5 wrapper overhead)
                let outwardAngle = Math.atan2(this.y - originY, this.x - originX);
                let angleDiff = outwardAngle - this.angle;
                if (angleDiff >  Math.PI) angleDiff -= 2 * Math.PI;
                if (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;
                this.angle += angleDiff * 0.025;
            }

            // Cache cos/sin for the move step
            let ca = Math.cos(this.angle);
            let sa = Math.sin(this.angle);
            this.x += ca * this.speed;
            this.y += sa * this.speed;

            // Taper
            this.w *= this.taperRate;

            // Stop conditions (slightly more aggressive threshold)
            if (this.w < 0.12) { this.stopped = true; return; }
            if (this.x < -10 || this.x > width + 10 || this.y < -10 || this.y > height + 10) {
                this.stopped = true; return;
            }

            // Probabilistic branching
            if (hyphae.length < params.maxHyphae && this.generation < params.maxGen) {
                let branchP = params.branchProb * Math.pow(0.72, this.generation);
                if (random() < branchP) {
                    let branchAngle = this.angle + random(-0.9, 0.9);
                    hyphae.push(new Hypha(this.x, this.y, branchAngle, this.w * 0.65, this.generation + 1));
                }
            }
        }

        draw() {
            let dx = this.x - originX;
            let dy = this.y - originY;
            // Avoid sqrt by using cachedMaxD (pre-computed, avoids per-call Math.sqrt)
            let cb = 1.0 - Math.sqrt(dx * dx + dy * dy) / cachedMaxD;
            if (cb < 0) cb = 0; else if (cb > 1) cb = 1;
            let cb2 = cb * cb;

            // Inline lerp to avoid p5 lerp() call overhead
            let h = 38 - 13 * cb2;                                 // lerp(38, 25, cb2)
            let s = (8 + 62 * cb2) * params.orangeIntensity;       // lerp(8, 70, cb2)
            let b = 90 + 10 * cb;                                   // lerp(90, 100, cb)
            // Slightly boosted alpha (compensates for removed glow pass)
            let alpha = (3 + 140 * ((this.w - 0.1) * 0.2941)) * (0.6 + 0.4 * cb) * 1.1;
            if (alpha > 255) alpha = 255;

            stroke(h, s, b, alpha);
            strokeWeight(this.w);
            line(this.prevX, this.prevY, this.x, this.y);
            // Glow double-draw pass removed — halves draw calls for center hyphae
        }
    }

    function setup() {
        let parent = document.getElementById('canvas-parent');
        let canvas = createCanvas(parent.clientWidth, parent.clientHeight);
        canvas.parent('canvas-parent');
        colorMode(HSB, 360, 100, 100, 255);
        frameRate(30);  // 30fps halves CPU vs default 60fps
        noSmooth();     // disable anti-aliasing to reduce GPU load
        initSimulation();
    }

    function initSimulation() {
        background(8, 10, 7);
        hyphae  = [];
        originX = width  * 0.5;
        originY = height * 0.5;
        // Cache max distance once instead of recomputing every draw() call per hypha
        cachedMaxD = Math.sqrt(width * width + height * height) * 0.4;

        let count = params.spawnCount;
        for (let i = 0; i < count; i++) {
            let angle = (2 * Math.PI / count) * i + random(-0.15, 0.15);
            hyphae.push(new Hypha(originX, originY, angle, random(1.5, 3.5)));
        }
    }

    function draw() {
        // Frame-budget loop: bail out if we've spent more than ~12ms this frame,
        // so remaining hyphae are drawn next frame. Prevents jank on slow hardware.
        const t0 = performance.now();
        for (let i = hyphae.length - 1; i >= 0; i--) {
            const h = hyphae[i];
            h.update();
            h.draw();
            if (h.stopped) {
                hyphae[i] = hyphae[hyphae.length - 1];
                hyphae.pop();
            }
            // Check time budget every 20 iterations to keep overhead low
            if ((i & 19) === 0 && performance.now() - t0 > 12) break;
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        initSimulation();
    }
    </script>
</body>
</html>
