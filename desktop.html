<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cordyceps militaris Simulation</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #0a0b09; font-family: system-ui, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }

        #toggle-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 20;
            padding: 8px 14px;
            background: rgba(12, 16, 20, 0.85);
            border: 1px solid rgba(255, 170, 80, 0.45);
            border-radius: 8px;
            color: #ffaa50;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0.03em;
        }
        #toggle-btn:hover { background: rgba(255, 170, 80, 0.12); }

        #control-panel {
            position: fixed;
            top: 50px;
            right: 12px;
            z-index: 10;
            width: 240px;
            background: rgba(12, 16, 20, 0.88);
            border: 1px solid rgba(255, 170, 80, 0.3);
            border-radius: 10px;
            padding: 14px;
            color: #ffeedd;
            transition: opacity 0.2s, transform 0.2s;
        }
        #control-panel.hidden { opacity: 0; pointer-events: none; transform: translateY(-8px); }

        .row { margin-bottom: 10px; }
        .lab { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: #ffd9b0; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 170, 80, 0.2);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff9a40;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #ff9a40;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        #restart-btn {
            width: 100%;
            margin-top: 6px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 170, 80, 0.45);
            background: rgba(255, 170, 80, 0.12);
            color: #ffd9b0;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.03em;
        }
        #restart-btn:hover { background: rgba(255, 170, 80, 0.22); }
    </style>
</head>
<body>
    <canvas id="sim"></canvas>
    <button id="toggle-btn">⚙ Controls</button>
    <div id="control-panel">
        <div class="row"><div class="lab"><span>Growth Speed</span><span id="v-growthSpeed">0.15</span></div><input id="s-growthSpeed" type="range" min="0.02" max="0.60" step="0.01" value="0.15"></div>
        <div class="row"><div class="lab"><span>Edge Fuzziness</span><span id="v-fuzziness">0.42</span></div><input id="s-fuzziness" type="range" min="0.00" max="0.80" step="0.01" value="0.42"></div>
        <div class="row"><div class="lab"><span>Cotton Texture</span><span id="v-density">6</span></div><input id="s-density" type="range" min="1" max="16" step="1" value="6"></div>
        <div class="row"><div class="lab"><span>Orange Intensity</span><span id="v-colorIntensity">1.00</span></div><input id="s-colorIntensity" type="range" min="0.0" max="2.0" step="0.05" value="1.0"></div>
        <button id="restart-btn">↺ Restart</button>
    </div>

    <script>
    'use strict';

    // ── Canvas setup ──────────────────────────────────────────────────────────
    const cv  = document.getElementById('sim');
    const ctx = cv.getContext('2d');

    let colonyRadius, tick, cx, cy;
    let rafId = null, lastStamp = 0;
    const FRAME_MS = 1000 / 30;   // target 30 fps — halves CPU vs 60 fps

    const params = {
        growthSpeed:    0.18,
        fuzziness:      0.42,   // higher = more organic lumpy edge
        density:        6,      // cotton blob count per frame
        colorIntensity: 1.0,
    };

    const SEGS = 80; // polygon resolution for noisy edge

    // ── Minimal smooth 2-D value noise (no external library) ─────────────────
    function hash2D(x, y) {
        const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
        return n - Math.floor(n);
    }
    function noise(x, y) {
        const ix = Math.floor(x), iy = Math.floor(y);
        const fx = x - ix,        fy = y - iy;
        const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
        const a = hash2D(ix, iy),     b = hash2D(ix + 1, iy);
        const c = hash2D(ix, iy + 1), d = hash2D(ix + 1, iy + 1);
        return a + (b - a) * ux + (c - a) * uy + (a - b - c + d) * ux * uy;
    }

    // ── Draw one soft radial-gradient blob ───────────────────────────────────
    function puff(x, y, sz, h, s, l, a) {
        const grd = ctx.createRadialGradient(x, y, 0, x, y, sz);
        grd.addColorStop(0, `hsla(${h},${s}%,${l}%,${a})`);
        grd.addColorStop(1, `hsla(${h},${s}%,${l}%,0)`);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(x, y, sz, 0, Math.PI * 2);
        ctx.fill();
    }

    // ── Initialise / restart simulation ──────────────────────────────────────
    function init() {
        if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
        cv.width  = cv.clientWidth  || window.innerWidth;
        cv.height = cv.clientHeight || window.innerHeight;
        cx = cv.width  * 0.5;
        cy = cv.height * 0.5;
        colonyRadius = 6;
        tick = 0;

        ctx.fillStyle = '#0a0b09';
        ctx.fillRect(0, 0, cv.width, cv.height);

        // Inoculation dot — warm orange rings from outside in
        const ci = params.colorIntensity;
        for (let r = 14; r > 0; r--) {
            const a = (14 - r) / 14 * 0.22 + 0.02;
            puff(cx, cy, r * 2.4, 23, Math.min(100, 70 * ci), 55, a);
        }

        lastStamp = 0;
        rafId = requestAnimationFrame(frame);
    }

    // ── Animation loop (30 fps cap) ───────────────────────────────────────────
    function frame(ts) {
        rafId = requestAnimationFrame(frame);
        const dt = ts - lastStamp;
        if (dt < FRAME_MS) return;
        lastStamp = ts - (dt % FRAME_MS);
        step();
    }

    // ── One simulation step ───────────────────────────────────────────────────
    function step() {
        tick++;
        const T  = tick * 0.002;
        const cr = colonyRadius;
        const maxR = Math.min(cv.width, cv.height) * 0.47;
        if (cr < maxR) colonyRadius += params.growthSpeed;

        const fz = params.fuzziness;
        const ci = params.colorIntensity;
        const dn = Math.max(1, params.density | 0);

        // ── Noisy edge polygon — 3 octaves for organic lumpy shape ─────────────
        const pts = new Float32Array(SEGS * 2);
        for (let i = 0; i < SEGS; i++) {
            const ang = (i / SEGS) * Math.PI * 2;
            const ca  = Math.cos(ang), sa = Math.sin(ang);
            const nv  = noise(ca * 2.5 + T * 0.30, sa * 2.5 + T * 0.25) * 0.45
                      + noise(ca * 6.5 + T * 0.85, sa * 6.5 + T * 0.80) * 0.35
                      + noise(ca * 15 + T * 1.70, sa * 15 + T * 1.60) * 0.20;
            const r   = cr * (1.0 + (nv - 0.5) * fz * 1.8);
            pts[i * 2]     = cx + ca * r;
            pts[i * 2 + 1] = cy + sa * r;
        }

        // ── Main fill: radial gradient polygon, accumulates colony density ──────
        const edgeR = cr * (1.0 + fz * 0.6);
        const grd   = ctx.createRadialGradient(cx, cy, 0, cx, cy, edgeR);
        grd.addColorStop(0,    `hsla(21, ${Math.min(100, 68 * ci)}%, 48%, 0.016)`);
        grd.addColorStop(0.30, `hsla(25, ${Math.min(100, 38 * ci)}%, 60%, 0.012)`);
        grd.addColorStop(0.60, `hsla(30, ${Math.min(100, 14 * ci)}%, 80%, 0.008)`);
        grd.addColorStop(0.82, `hsla(34, ${Math.min(100,  5 * ci)}%, 92%, 0.005)`);
        grd.addColorStop(1.0,  `hsla(37, ${Math.min(100,  2 * ci)}%, 97%, 0.002)`);
        ctx.beginPath();
        ctx.moveTo(pts[0], pts[1]);
        for (let i = 1; i < SEGS; i++) ctx.lineTo(pts[i * 2], pts[i * 2 + 1]);
        ctx.closePath();
        ctx.fillStyle = grd;
        ctx.fill();

        // ── Cotton tufts: overlapping soft blobs at the growing frontier ────────
        const numTufts = dn * 5;
        for (let i = 0; i < numTufts; i++) {
            const idx = (Math.random() * SEGS) | 0;
            const ex  = pts[idx * 2], ey = pts[idx * 2 + 1];
            const bx  = ex + (Math.random() - 0.5) * cr * 0.06;
            const by  = ey + (Math.random() - 0.5) * cr * 0.06;
            const sz  = 2 + Math.random() * Math.random() * 13;
            const ws  = Math.min(100, (3 + Math.random() * 8) * ci);
            puff(bx, by, sz, 35, ws, 87 + Math.random() * 9, 0.04 + Math.random() * 0.04);
        }

        // ── Wispy tendrils — fine tips that reach just beyond the main edge ─────
        const numWisps = dn * 3;
        for (let i = 0; i < numWisps; i++) {
            const idx = (Math.random() * SEGS) | 0;
            const ex  = pts[idx * 2], ey = pts[idx * 2 + 1];
            const dx  = ex - cx, dy = ey - cy;
            const len = Math.sqrt(dx * dx + dy * dy) + 1e-6;
            const bx  = ex + (dx / len) * (1 + Math.random() * cr * 0.055);
            const by  = ey + (dy / len) * (1 + Math.random() * cr * 0.055);
            puff(bx, by, 1 + Math.random() * 4, 36, Math.min(100, 4 * ci), 96, 0.07 + Math.random() * 0.05);
        }

        // ── Interior stipple: fine scattered dots that deepen the cotton texture ─
        const numDots = dn * 4;
        for (let i = 0; i < numDots; i++) {
            const ang   = Math.random() * Math.PI * 2;
            const r     = Math.sqrt(Math.random()) * cr * 0.90;
            const normR = r / (maxR + 1);
            puff(cx + Math.cos(ang) * r, cy + Math.sin(ang) * r,
                 2 + Math.random() * 5,
                 21 + normR * 15,
                 Math.min(100, (68 - normR * 62) * ci),
                 50 + normR * 40, 0.018);
        }

        // ── Core reinforcement every 4 ticks — deepens warm orange centre ───────
        if (tick % 4 === 0) {
            for (let i = 0; i < 3; i++) {
                const ang = Math.random() * Math.PI * 2;
                const r   = Math.random() * cr * 0.30;
                puff(cx + Math.cos(ang) * r, cy + Math.sin(ang) * r,
                     10 + Math.random() * 20, 20, Math.min(100, 72 * ci), 46, 0.025);
            }
        }
    }

    // ── Control panel wiring ─────────────────────────────────────────────────
    document.getElementById('toggle-btn').addEventListener('click', () =>
        document.getElementById('control-panel').classList.toggle('hidden'));

    [
        ['s-growthSpeed',    'v-growthSpeed',    'growthSpeed',    v => +v,  v => (+v).toFixed(2)],
        ['s-fuzziness',      'v-fuzziness',      'fuzziness',      v => +v,  v => (+v).toFixed(2)],
        ['s-density',        'v-density',        'density',        v => v|0, v => String(v|0)     ],
        ['s-colorIntensity', 'v-colorIntensity', 'colorIntensity', v => +v,  v => (+v).toFixed(2)],
    ].forEach(([sid, vid, key, parse, fmt]) => {
        const sl = document.getElementById(sid);
        const vl = document.getElementById(vid);
        sl.addEventListener('input', () => { params[key] = parse(sl.value); vl.textContent = fmt(sl.value); });
    });

    document.getElementById('restart-btn').addEventListener('click', init);

    // ── Resize (debounced) ────────────────────────────────────────────────────
    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(init, 150); });

    // ── Boot ──────────────────────────────────────────────────────────────────
    init();
    </script>
</body>
</html>
