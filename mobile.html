<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cordyceps militaris — Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #0c0e12; }
        #canvas-parent { width: 100%; height: 100%; }
        #fade-top {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 25vh;
            pointer-events: none;
            background: linear-gradient(to bottom, #0c0e12 0%, transparent 100%);
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="canvas-parent"></div>
    <div id="fade-top"></div>

    <script>
    let hyphae  = [];
    let originX, originY;

    let params = {
        speedMult:       0.7,
        maxHyphae:       4000,
        spawnCount:      60,
        maxGen:          8,
        taperRate:       0.999,
        wanderScale:     0.30,
        branchProb:      0.12,
        orangeIntensity: 1.0,
    };

    class Hypha {
        constructor(x, y, angle, w, generation = 0) {
            this.x           = x;
            this.y           = y;
            this.prevX       = x;
            this.prevY       = y;
            this.angle       = angle;
            this.w           = w;
            this.generation  = generation;
            this.speed       = random(0.7, 1.4) * Math.pow(0.85, generation) * params.speedMult;
            this.stopped     = false;
            this.noiseOffset = random(1000);
            this.taperRate   = params.taperRate - generation * 0.0002;
        }

        update() {
            this.prevX = this.x;
            this.prevY = this.y;

            // Perlin noise wander
            let noiseVal = noise(this.noiseOffset) - 0.5;
            this.noiseOffset += 0.012;
            this.angle += noiseVal * params.wanderScale;

            // Weak outward bias from origin
            let outwardAngle = atan2(this.y - originY, this.x - originX);
            let angleDiff = outwardAngle - this.angle;
            while (angleDiff >  PI) angleDiff -= TWO_PI;
            while (angleDiff < -PI) angleDiff += TWO_PI;
            this.angle += angleDiff * 0.025;

            // Move
            this.x += cos(this.angle) * this.speed;
            this.y += sin(this.angle) * this.speed;

            // Taper
            this.w *= this.taperRate;

            // Stop conditions
            if (this.w < 0.1) { this.stopped = true; return; }
            if (this.x < -10 || this.x > width + 10 || this.y < -10 || this.y > height + 10) {
                this.stopped = true; return;
            }

            // Branching
            if (hyphae.length < params.maxHyphae && this.generation < params.maxGen) {
                let branchP = params.branchProb * Math.pow(0.72, this.generation);
                if (random() < branchP) {
                    let branchAngle = this.angle + random(-0.9, 0.9);
                    hyphae.push(new Hypha(this.x, this.y, branchAngle, this.w * 0.65, this.generation + 1));
                }
            }
        }

        draw() {
            let d = Math.sqrt((this.x - originX) * (this.x - originX) + (this.y - originY) * (this.y - originY));
            let maxD = Math.sqrt(width * width + height * height) * 0.4;
            let centerBlend = constrain(1.0 - d / maxD, 0, 1);

            let h = lerp(38, 25, centerBlend * centerBlend);
            let s = lerp(8, 70, centerBlend * centerBlend) * params.orangeIntensity;
            let b = lerp(90, 100, centerBlend);
            let alpha = (3 + 140 * ((this.w - 0.1) / 3.4)) * lerp(0.6, 1.0, centerBlend);

            stroke(h, s, b, alpha);
            strokeWeight(this.w);
            line(this.prevX, this.prevY, this.x, this.y);

            if (this.w > 1.5 && centerBlend > 0.3) {
                stroke(30, 60, 100, alpha * 0.4);
                strokeWeight(this.w * 0.25);
                line(this.prevX, this.prevY, this.x, this.y);
            }
        }
    }

    function setup() {
        let parent = document.getElementById('canvas-parent');
        let canvas = createCanvas(parent.clientWidth, parent.clientHeight);
        canvas.parent('canvas-parent');
        colorMode(HSB, 360, 100, 100, 255);
        initSimulation();
    }

    function initSimulation() {
        background(8, 10, 7);
        hyphae  = [];
        originX = width  * 0.5;
        originY = height * 0.95;

        let count = params.spawnCount;
        for (let i = 0; i < count; i++) {
            // Fan hyphae upward: angles span from -PI+0.3 to -0.3 (pointing upward)
            let angle = map(i, 0, count - 1, -PI + 0.3, -0.3) + random(-0.1, 0.1);
            hyphae.push(new Hypha(originX, originY, angle, random(1.5, 3.5)));
        }
    }

    function draw() {
        for (let i = hyphae.length - 1; i >= 0; i--) {
            let h = hyphae[i];
            h.update();
            h.draw();
            if (h.stopped) {
                hyphae[i] = hyphae[hyphae.length - 1];
                hyphae.pop();
            }
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        initSimulation();
    }
    </script>
</body>
</html>
