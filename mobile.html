<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cordyceps militaris — Mobile</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #0a0b09; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="sim"></canvas>

    <script>
    'use strict';

    // ── Canvas setup ──────────────────────────────────────────────────────────
    const cv  = document.getElementById('sim');
    const ctx = cv.getContext('2d');

    let colonyRadius, tick, cx, cy;
    let rafId = null, lastStamp = 0;
    const FRAME_MS = 1000 / 20;   // 20 fps — lightest possible on mobile battery

    // Fixed params (no control panel on mobile)
    const growthSpeed    = 0.16;
    const fuzziness      = 0.30;
    const density        = 3;
    const colorIntensity = 1.0;

    const SEGS = 48; // lower polygon resolution on mobile

    // ── Minimal smooth 2-D value noise ────────────────────────────────────────
    function hash2D(x, y) {
        const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
        return n - Math.floor(n);
    }
    function noise(x, y) {
        const ix = Math.floor(x), iy = Math.floor(y);
        const fx = x - ix,        fy = y - iy;
        const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
        const a = hash2D(ix, iy),     b = hash2D(ix + 1, iy);
        const c = hash2D(ix, iy + 1), d = hash2D(ix + 1, iy + 1);
        return a + (b - a) * ux + (c - a) * uy + (a - b - c + d) * ux * uy;
    }

    // ── Draw one soft radial-gradient blob ───────────────────────────────────
    function puff(x, y, sz, h, s, l, a) {
        const grd = ctx.createRadialGradient(x, y, 0, x, y, sz);
        grd.addColorStop(0, `hsla(${h},${s}%,${l}%,${a})`);
        grd.addColorStop(1, `hsla(${h},${s}%,${l}%,0)`);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(x, y, sz, 0, Math.PI * 2);
        ctx.fill();
    }

    // ── Initialise / restart simulation ──────────────────────────────────────
    function init() {
        if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
        cv.width  = cv.clientWidth  || window.innerWidth;
        cv.height = cv.clientHeight || window.innerHeight;
        cx = cv.width  * 0.5;
        cy = cv.height * 0.5;
        colonyRadius = 6;
        tick = 0;

        ctx.fillStyle = '#0a0b09';
        ctx.fillRect(0, 0, cv.width, cv.height);

        // Inoculation dot
        for (let r = 14; r > 0; r--) {
            const a = (14 - r) / 14 * 0.22 + 0.02;
            puff(cx, cy, r * 2.4, 23, Math.min(100, 70 * colorIntensity), 55, a);
        }

        lastStamp = 0;
        rafId = requestAnimationFrame(frame);
    }

    // ── Animation loop (20 fps cap) ───────────────────────────────────────────
    function frame(ts) {
        rafId = requestAnimationFrame(frame);
        const dt = ts - lastStamp;
        if (dt < FRAME_MS) return;
        lastStamp = ts - (dt % FRAME_MS);
        step();
    }

    // ── One simulation step ───────────────────────────────────────────────────
    function step() {
        tick++;
        const T  = tick * 0.0025;
        const cr = colonyRadius;
        const maxR = Math.min(cv.width, cv.height) * 0.47;
        if (cr < maxR) colonyRadius += growthSpeed;

        // Compute noisy edge — 48-point polygon (two octaves for organic shape)
        const pts = new Float32Array(SEGS * 2);
        for (let i = 0; i < SEGS; i++) {
            const ang = (i / SEGS) * Math.PI * 2;
            const ca  = Math.cos(ang), sa = Math.sin(ang);
            const nv  = noise(ca * 2.8 + T * 0.5, sa * 2.8 + T * 0.4) * 0.65
                      + noise(ca * 6.0 + T * 1.2, sa * 6.0 + T * 1.1) * 0.35;
            const r   = cr * (1.0 + (nv - 0.5) * fuzziness);
            pts[i * 2]     = cx + ca * r;
            pts[i * 2 + 1] = cy + sa * r;
        }

        // ── Main fill: one noisy circle, accumulates density naturally over time
        const edgeR = cr * (1.0 + fuzziness * 0.5);
        const grd   = ctx.createRadialGradient(cx, cy, 0, cx, cy, edgeR);
        grd.addColorStop(0,    `hsla(22, ${Math.min(100, 62 * colorIntensity)}%, 50%, 0.018)`);
        grd.addColorStop(0.40, `hsla(27, ${Math.min(100, 28 * colorIntensity)}%, 68%, 0.014)`);
        grd.addColorStop(0.75, `hsla(33, ${Math.min(100,  7 * colorIntensity)}%, 88%, 0.009)`);
        grd.addColorStop(1.0,  `hsla(37, ${Math.min(100,  2 * colorIntensity)}%, 95%, 0.003)`);
        ctx.beginPath();
        ctx.moveTo(pts[0], pts[1]);
        for (let i = 1; i < SEGS; i++) ctx.lineTo(pts[i * 2], pts[i * 2 + 1]);
        ctx.closePath();
        ctx.fillStyle = grd;
        ctx.fill();

        // ── Edge texture: sparse wispy blobs at frontier (every other frame) ──
        if (tick % 2 === 0) {
            const ws = Math.min(100, 5 * colorIntensity);
            for (let i = 0; i < density; i++) {
                const idx = (Math.random() * SEGS | 0);
                const ex  = pts[idx * 2], ey = pts[idx * 2 + 1];
                const bx  = ex + (Math.random() - 0.5) * cr * 0.07;
                const by  = ey + (Math.random() - 0.5) * cr * 0.07;
                const sz  = 3 + Math.random() * 6;
                const g   = ctx.createRadialGradient(bx, by, 0, bx, by, sz);
                g.addColorStop(0, `hsla(34, ${ws}%, 93%, 0.06)`);
                g.addColorStop(1, `hsla(34, ${ws}%, 93%, 0)`);
                ctx.beginPath();
                ctx.arc(bx, by, sz, 0, Math.PI * 2);
                ctx.fillStyle = g;
                ctx.fill();
            }
        }

        // ── Core reinforcement every 8 ticks ────────────────────────────────
        if (tick % 8 === 0) {
            const ang = Math.random() * Math.PI * 2;
            const r   = Math.random() * cr * 0.22;
            const bx  = cx + Math.cos(ang) * r;
            const by  = cy + Math.sin(ang) * r;
            const sz  = 6 + Math.random() * 12;
            const g   = ctx.createRadialGradient(bx, by, 0, bx, by, sz);
            g.addColorStop(0, `hsla(22, ${Math.min(100, 68 * colorIntensity)}%, 50%, 0.04)`);
            g.addColorStop(1, `hsla(22, ${Math.min(100, 68 * colorIntensity)}%, 50%, 0)`);
            ctx.beginPath();
            ctx.arc(bx, by, sz, 0, Math.PI * 2);
            ctx.fillStyle = g;
            ctx.fill();
        }
    }

    // ── Resize (debounced) ────────────────────────────────────────────────────
    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(init, 150); });

    // ── Boot ──────────────────────────────────────────────────────────────────
    init();
    </script>
</body>
</html>
