<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cordyceps militaris — Mobile</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #0a0b09; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="sim"></canvas>

    <script>
    'use strict';

    // ── Canvas setup ──────────────────────────────────────────────────────────
    const cv  = document.getElementById('sim');
    const ctx = cv.getContext('2d');

    let colonyRadius, tick, cx, cy;
    let rafId = null, lastStamp = 0;
    const FRAME_MS = 1000 / 24;   // 24 fps — light on mobile battery

    // Fixed params (no control panel on mobile)
    const growthSpeed    = 0.13;
    const fuzziness      = 0.28;
    const density        = 14;
    const colorIntensity = 1.0;

    // ── Minimal smooth 2-D value noise ────────────────────────────────────────
    function hash2D(x, y) {
        const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
        return n - Math.floor(n);
    }
    function noise(x, y) {
        const ix = Math.floor(x), iy = Math.floor(y);
        const fx = x - ix,        fy = y - iy;
        const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
        const a = hash2D(ix, iy),     b = hash2D(ix + 1, iy);
        const c = hash2D(ix, iy + 1), d = hash2D(ix + 1, iy + 1);
        return a + (b - a) * ux + (c - a) * uy + (a - b - c + d) * ux * uy;
    }

    // ── Draw one soft radial-gradient blob ───────────────────────────────────
    function puff(x, y, sz, h, s, l, a) {
        const grd = ctx.createRadialGradient(x, y, 0, x, y, sz);
        grd.addColorStop(0, `hsla(${h},${s}%,${l}%,${a})`);
        grd.addColorStop(1, `hsla(${h},${s}%,${l}%,0)`);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(x, y, sz, 0, Math.PI * 2);
        ctx.fill();
    }

    // ── Initialise / restart simulation ──────────────────────────────────────
    function init() {
        if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
        cv.width  = cv.clientWidth  || window.innerWidth;
        cv.height = cv.clientHeight || window.innerHeight;
        cx = cv.width  * 0.5;
        cy = cv.height * 0.5;
        colonyRadius = 6;
        tick = 0;

        ctx.fillStyle = '#0a0b09';
        ctx.fillRect(0, 0, cv.width, cv.height);

        // Inoculation dot
        for (let r = 14; r > 0; r--) {
            const a = (14 - r) / 14 * 0.22 + 0.02;
            puff(cx, cy, r * 2.4, 23, Math.min(100, 70 * colorIntensity), 55, a);
        }

        lastStamp = 0;
        rafId = requestAnimationFrame(frame);
    }

    // ── Animation loop (24 fps cap) ───────────────────────────────────────────
    function frame(ts) {
        rafId = requestAnimationFrame(frame);
        const dt = ts - lastStamp;
        if (dt < FRAME_MS) return;
        lastStamp = ts - (dt % FRAME_MS);
        step();
    }

    // ── One simulation step ───────────────────────────────────────────────────
    function step() {
        tick++;
        const T  = tick * 0.004;
        const cr = colonyRadius;
        const maxR = Math.min(cv.width, cv.height) * 0.47;
        if (cr < maxR) colonyRadius += growthSpeed;

        const n = Math.max(1, density);

        for (let i = 0; i < n; i++) {
            const ang = Math.random() * Math.PI * 2;
            const ca  = Math.cos(ang), sa = Math.sin(ang);

            const nv    = noise(ca * 3.0 + T * 0.6, sa * 3.0 + T * 0.6);
            const edgeR = cr * (1.0 + (nv - 0.5) * fuzziness);

            let rPos;
            const zone = Math.random();
            if (zone < 0.55)      rPos = edgeR * (0.78 + Math.random() * 0.28);
            else if (zone < 0.80) rPos = edgeR * (0.45 + Math.random() * 0.33);
            else                  rPos = edgeR *  Math.random() * 0.45;

            const x  = cx + ca * rPos;
            const y  = cy + sa * rPos;
            const dr = Math.min(rPos / Math.max(cr, 1), 1.3);

            let h, s, l, a, sz;

            if (dr < 0.35) {
                h  = 20 + Math.random() * 8;
                s  = Math.min(100, (55 + Math.random() * 20) * colorIntensity);
                l  = 48 + Math.random() * 12;
                a  = 0.07 + Math.random() * 0.13;
                sz = 7   + Math.random() * 15;
            } else if (dr < 0.68) {
                h  = 27 + Math.random() * 11;
                s  = Math.min(100, (30 + Math.random() * 62) * colorIntensity);
                l  = 72 + Math.random() * 15;
                a  = 0.04 + Math.random() * 0.07;
                sz = 5   + Math.random() * 11;
            } else if (dr < 0.88) {
                h  = 33 + Math.random() * 17;
                s  = Math.min(100, (3 + Math.random() * 9) * colorIntensity);
                l  = 87 + Math.random() * 10;
                a  = 0.02 + Math.random() * 0.05;
                sz = 4   + Math.random() * 9;
            } else {
                h  = 38 + Math.random() * 20;
                s  = Math.min(100, (1 + Math.random() * 5) * colorIntensity);
                l  = 93 + Math.random() * 7;
                a  = 0.01 + Math.random() * 0.03;
                sz = 3   + Math.random() * 7;
            }

            puff(x, y, sz,       h, s,        l, a);
            puff(x, y, sz * 2.5, h, s * 0.35, l, a * 0.28);
        }

        if (tick % 4 === 0) {
            for (let i = 0; i < 6; i++) {
                const ang = Math.random() * Math.PI * 2;
                const r   = Math.random() * cr * 0.3;
                puff(cx + Math.cos(ang) * r, cy + Math.sin(ang) * r,
                     4 + Math.random() * 10, 23, Math.min(100, 65 * colorIntensity), 52,
                     0.03 + Math.random() * 0.09);
            }
        }
    }

    // ── Resize (debounced) ────────────────────────────────────────────────────
    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(init, 150); });

    // ── Boot ──────────────────────────────────────────────────────────────────
    init();
    </script>
</body>
</html>
