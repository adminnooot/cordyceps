<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cordyceps militaris — Mobile</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #0a0b09; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="sim"></canvas>

    <script>
    'use strict';

    // ── Canvas setup ──────────────────────────────────────────────────────────
    const cv  = document.getElementById('sim');
    const ctx = cv.getContext('2d');

    let colonyRadius, tick, cx, cy;
    let rafId = null, lastStamp = 0;
    const FRAME_MS = 1000 / 20;   // 20 fps — lightest possible on mobile battery

    // Fixed params (no control panel on mobile)
    const growthSpeed    = 0.16;
    const fuzziness      = 0.38;
    const density        = 5;
    const colorIntensity = 1.0;

    const SEGS = 48; // lower polygon resolution on mobile

    // ── Minimal smooth 2-D value noise ────────────────────────────────────────
    function hash2D(x, y) {
        const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
        return n - Math.floor(n);
    }
    function noise(x, y) {
        const ix = Math.floor(x), iy = Math.floor(y);
        const fx = x - ix,        fy = y - iy;
        const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
        const a = hash2D(ix, iy),     b = hash2D(ix + 1, iy);
        const c = hash2D(ix, iy + 1), d = hash2D(ix + 1, iy + 1);
        return a + (b - a) * ux + (c - a) * uy + (a - b - c + d) * ux * uy;
    }

    // ── Draw one soft radial-gradient blob ───────────────────────────────────
    function puff(x, y, sz, h, s, l, a) {
        const grd = ctx.createRadialGradient(x, y, 0, x, y, sz);
        grd.addColorStop(0, `hsla(${h},${s}%,${l}%,${a})`);
        grd.addColorStop(1, `hsla(${h},${s}%,${l}%,0)`);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(x, y, sz, 0, Math.PI * 2);
        ctx.fill();
    }

    // ── Initialise / restart simulation ──────────────────────────────────────
    function init() {
        if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
        cv.width  = cv.clientWidth  || window.innerWidth;
        cv.height = cv.clientHeight || window.innerHeight;
        cx = cv.width  * 0.5;
        cy = cv.height * 0.5;
        colonyRadius = 6;
        tick = 0;

        ctx.fillStyle = '#0a0b09';
        ctx.fillRect(0, 0, cv.width, cv.height);

        // Inoculation dot
        for (let r = 14; r > 0; r--) {
            const a = (14 - r) / 14 * 0.22 + 0.02;
            puff(cx, cy, r * 2.4, 23, Math.min(100, 70 * colorIntensity), 55, a);
        }

        lastStamp = 0;
        rafId = requestAnimationFrame(frame);
    }

    // ── Animation loop (20 fps cap) ───────────────────────────────────────────
    function frame(ts) {
        rafId = requestAnimationFrame(frame);
        const dt = ts - lastStamp;
        if (dt < FRAME_MS) return;
        lastStamp = ts - (dt % FRAME_MS);
        step();
    }

    // ── One simulation step ───────────────────────────────────────────────────
    function step() {
        tick++;
        const T  = tick * 0.002;
        const cr = colonyRadius;
        const maxR = Math.min(cv.width, cv.height) * 0.47;
        if (cr < maxR) colonyRadius += growthSpeed;

        // ── Noisy edge — 3 octaves for organic lumpy shape ────────────────────
        const pts = new Float32Array(SEGS * 2);
        for (let i = 0; i < SEGS; i++) {
            const ang = (i / SEGS) * Math.PI * 2;
            const ca  = Math.cos(ang), sa = Math.sin(ang);
            const nv  = noise(ca * 2.5 + T * 0.30, sa * 2.5 + T * 0.25) * 0.45
                      + noise(ca * 6.5 + T * 0.85, sa * 6.5 + T * 0.80) * 0.35
                      + noise(ca * 14 + T * 1.60, sa * 14 + T * 1.50) * 0.20;
            const r   = cr * (1.0 + (nv - 0.5) * fuzziness * 1.7);
            pts[i * 2]     = cx + ca * r;
            pts[i * 2 + 1] = cy + sa * r;
        }

        // ── Main fill ─────────────────────────────────────────────────────────
        const edgeR = cr * (1.0 + fuzziness * 0.6);
        const grd   = ctx.createRadialGradient(cx, cy, 0, cx, cy, edgeR);
        grd.addColorStop(0,    `hsla(21, ${Math.min(100, 68 * colorIntensity)}%, 48%, 0.016)`);
        grd.addColorStop(0.30, `hsla(25, ${Math.min(100, 38 * colorIntensity)}%, 60%, 0.012)`);
        grd.addColorStop(0.60, `hsla(30, ${Math.min(100, 14 * colorIntensity)}%, 80%, 0.008)`);
        grd.addColorStop(0.82, `hsla(34, ${Math.min(100,  5 * colorIntensity)}%, 92%, 0.005)`);
        grd.addColorStop(1.0,  `hsla(37, ${Math.min(100,  2 * colorIntensity)}%, 97%, 0.002)`);
        ctx.beginPath();
        ctx.moveTo(pts[0], pts[1]);
        for (let i = 1; i < SEGS; i++) ctx.lineTo(pts[i * 2], pts[i * 2 + 1]);
        ctx.closePath();
        ctx.fillStyle = grd;
        ctx.fill();

        // ── Cotton tufts at the frontier ──────────────────────────────────────
        for (let i = 0; i < density * 4; i++) {
            const idx = (Math.random() * SEGS) | 0;
            const ex  = pts[idx * 2], ey = pts[idx * 2 + 1];
            const bx  = ex + (Math.random() - 0.5) * cr * 0.06;
            const by  = ey + (Math.random() - 0.5) * cr * 0.06;
            const sz  = 2 + Math.random() * Math.random() * 12;
            puff(bx, by, sz, 35,
                 Math.min(100, (4 + Math.random() * 7) * colorIntensity),
                 88 + Math.random() * 8, 0.04 + Math.random() * 0.04);
        }

        // ── Wispy tendrils beyond edge ────────────────────────────────────────
        for (let i = 0; i < density * 2; i++) {
            const idx = (Math.random() * SEGS) | 0;
            const ex  = pts[idx * 2], ey = pts[idx * 2 + 1];
            const dx  = ex - cx, dy = ey - cy;
            const len = Math.sqrt(dx * dx + dy * dy) + 1e-6;
            const bx  = ex + (dx / len) * (1 + Math.random() * cr * 0.05);
            const by  = ey + (dy / len) * (1 + Math.random() * cr * 0.05);
            puff(bx, by, 1 + Math.random() * 4, 36,
                 Math.min(100, 4 * colorIntensity), 96, 0.07 + Math.random() * 0.05);
        }

        // ── Core every 8 ticks ────────────────────────────────────────────────
        if (tick % 8 === 0) {
            const ang = Math.random() * Math.PI * 2;
            const r   = Math.random() * cr * 0.30;
            puff(cx + Math.cos(ang) * r, cy + Math.sin(ang) * r,
                 8 + Math.random() * 16, 20, Math.min(100, 72 * colorIntensity), 46, 0.030);
        }
    }

    // ── Resize (debounced) ────────────────────────────────────────────────────
    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(init, 150); });

    // ── Boot ──────────────────────────────────────────────────────────────────
    init();
    </script>
</body>
</html>
