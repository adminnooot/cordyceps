<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cordyceps militaris — Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #0c0e12; }
        #canvas-parent { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="canvas-parent"></div>

    <script>
    let colonyRadius, t, cx, cy, frameNum;

    // Slightly reduced defaults vs desktop for better mobile performance
    const growthSpeed    = 0.13;
    const fuzziness      = 0.28;
    const density        = 18;
    const colorIntensity = 1.0;

    function setup() {
        let parent = document.getElementById('canvas-parent');
        let canvas = createCanvas(parent.clientWidth, parent.clientHeight);
        canvas.parent('canvas-parent');
        colorMode(HSB, 360, 100, 100, 100);
        initSimulation();
    }

    function initSimulation() {
        background(10, 8, 6);
        colonyRadius = 6;
        t = 0;
        frameNum = 0;
        cx = width * 0.5;
        cy = height * 0.5;

        // Draw initial dense inoculation point
        noStroke();
        for (let r = 14; r > 0; r--) {
            fill(24, 65 * colorIntensity, 90, map(r, 14, 0, 2, 28));
            ellipse(cx, cy, r * 3, r * 3);
        }
    }

    function draw() {
        t += 0.004;
        frameNum++;

        let maxR = min(width, height) * 0.47;
        if (colonyRadius < maxR) {
            colonyRadius += growthSpeed;
        }

        noStroke();
        let n = Math.max(1, density);

        for (let i = 0; i < n; i++) {
            let angle = random(TWO_PI);

            // Noise-displaced edge for organic, non-circular shape
            let nv = noise(cos(angle) * 3.0 + t * 0.6, sin(angle) * 3.0 + t * 0.6);
            let edgeR = colonyRadius * (1.0 + (nv - 0.5) * fuzziness);

            // Distribute puffs across zones: mostly at growing edge, some in interior
            let rPos;
            let zone = random();
            if (zone < 0.55) {
                rPos = edgeR * random(0.78, 1.06);
            } else if (zone < 0.80) {
                rPos = edgeR * random(0.45, 0.78);
            } else {
                rPos = edgeR * random(0, 0.45);
            }

            let x = cx + cos(angle) * rPos;
            let y = cy + sin(angle) * rPos;

            let dr = constrain(rPos / max(colonyRadius, 1), 0, 1.3);

            let hue, sat, bri, alpha, sz;

            if (dr < 0.35) {
                hue   = lerp(20, 28, random());
                sat   = lerp(58, 76, random()) * colorIntensity;
                bri   = lerp(82, 94, random());
                alpha = lerp(7, 20, random());
                sz    = random(7, 22);
            } else if (dr < 0.68) {
                hue   = lerp(27, 38, random());
                sat   = lerp(14, 48, random()) * colorIntensity;
                bri   = lerp(88, 98, random());
                alpha = lerp(4, 11, random());
                sz    = random(5, 16);
            } else if (dr < 0.88) {
                hue   = lerp(33, 50, random());
                sat   = lerp(3, 14, random()) * colorIntensity;
                bri   = lerp(93, 100, random());
                alpha = lerp(2, 7, random());
                sz    = random(4, 13);
            } else {
                hue   = lerp(38, 58, random());
                sat   = lerp(1, 7, random()) * colorIntensity;
                bri   = lerp(94, 100, random());
                alpha = lerp(1, 4, random());
                sz    = random(3, 10);
            }

            // Inner puff
            fill(hue, sat, bri, alpha);
            ellipse(x, y, sz, sz);

            // Soft outer halo
            fill(hue, sat * 0.35, bri, alpha * 0.28);
            ellipse(x, y, sz * 2.5, sz * 2.5);
        }

        // Periodically reinforce center density
        if (frameNum % 4 === 0) {
            for (let i = 0; i < 6; i++) {
                let angle = random(TWO_PI);
                let r     = random(colonyRadius * 0.3);
                fill(23, 68 * colorIntensity, 88, random(3, 12));
                ellipse(cx + cos(angle) * r, cy + sin(angle) * r, random(6, 20), random(6, 20));
            }
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        initSimulation();
    }
    </script>
</body>
</html>
